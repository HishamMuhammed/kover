name: Create Release

on:
  workflow_dispatch:

jobs:
  version:
    uses: ./.github/workflows/get-version.yml

  create-tag:
    name: Create Git Tag
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ needs.version.outputs.version }} -m "Release v${{ needs.version.outputs.version }}"
          git push origin ${{ needs.version.outputs.version }}

  create-release:
    name: Create GitHub Release
    needs:
      - version
      - create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.version }}
          generate_release_notes: true

  build-and-deploy-apk:
    name: Build & Deploy apk
    needs:
      - version
      - create-release
    runs-on: ubuntu-latest
    permissions:
      contents: "write"
      id-token: "write"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get FVM Configuration
        uses: kuhnroyal/flutter-fvm-config-action@v3
        id: fvm-config-action
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      - name: Decode Keystore
        run: echo "${{ secrets.GOOGLE_PLAY_KEYSTORE }}" | base64 --decode > android/app/upload-keystore.jks
      - name: Codegen
        run: |
          dart run build_runner build --delete-conflicting-outputs
      - name: Build
        run: |
          flutter build apk --release --build-name=${{ needs.version.outputs.version }} --build-number=${{ needs.version.outputs.build_number }}
        env:
          KEYSTORE_PATH: "upload-keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.GOOGLE_PLAY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.GOOGLE_PLAY_KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.GOOGLE_PLAY_KEY_PASSWORD }}
      - name: Upload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NAME="Kover-${{ needs.version.outputs.version }}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "$RELEASE_NAME"
          gh release upload ${{ needs.version.outputs.version }} "$RELEASE_NAME"

  build-linux-appimage:
    name: Build Linux AppImage
    needs:
      - version
      - create-release
    uses: ./.github/workflows/build-linux-appimage.yml
    with:
      version: ${{ needs.version.outputs.version }}
      build_number: ${{ needs.version.outputs.build_number }}
    secrets: inherit

  get-release-body:
    name: Get Release Body
    needs:
      - version
      - create-release
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.get-body.outputs.body }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get Release Body
        id: get-body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(gh release view ${{ needs.version.outputs.version }} --json body --jq '.body')
          CLEAN_BODY=$(echo "$BODY" | perl -0777 -pe '
            s/.*Full Changelog.*//gi;
            s/\s+by\s+(@[\w-]+|in).*//gm;
            s/\s*\(#\d+\)//g;
            s/https?:\/\/\S+//g;
            s/^\s*[-*+]\s+/• /gm;
            s/<[^>]*>//g;
            s/\[([^\]]+)\]\([^)]+\)/$1/g;
            s/[*_]{1,3}//g;
            s/^#+\s*//gm;
            s/^\s+//s'
          )
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  promote-ios-public:
    name: Promote iOS Public Testflight
    needs: get-release-body
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: ios
      - name: Promote Testflight Public
        run: |
          cd ios
          bundle exec fastlane public_beta
        env:
          CHANGELOG: ${{ needs.get-release-body.outputs.release_body }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}

  promote-macos-public:
    name: Promote MacOS Public Testflight
    needs: get-release-body
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: macos
      - name: Promote Testflight Public
        run: |
          cd macos
          bundle exec fastlane public_beta
        env:
          CHANGELOG: ${{ needs.get-release-body.outputs.release_body }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}

  promote-google-play-beta:
    name: Promote Google Play Beta Tracks
    needs: get-release-body
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Authenticate with Google Play
        uses: "google-github-actions/auth@v3"
        with:
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GOOGLE_CLOUD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_CLOUD_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: android
      - name: Promote Google Play
        run: |
          cd android
          bundle exec fastlane promote_beta_tracks
        env:
          CHANGELOG: ${{ needs.get-release-body.outputs.release_body }}

  upload-linux-appimage:
    name: Upload Linux AppImage to Release
    needs:
      - build-linux-appimage
      - create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: kover-linux-appimage
          path: .
      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.version }}
          files: Kover-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
