name: Build Linux AppImage

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g., 0.14.0)'
        required: true
        type: string
      build_number:
        description: 'Build number (GitHub run number)'
        required: true
        type: string
    outputs:
      appimage_path:
        description: 'Path to the built AppImage'
        value: ${{ jobs.build-linux-appimage.outputs.appimage_path }}

jobs:
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      appimage_path: ${{ steps.appimage.outputs.appimage_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get FVM Configuration
        uses: kuhnroyal/flutter-fvm-config-action@v3
        id: fvm-config-action

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libsecret-1-dev \
            libcurl4-openssl-dev \
            patchelf \
            desktop-file-utils \
            libfuse2 \
            rpm

      - name: Install dependencies & generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Build Linux release
        run: |
          flutter build linux --release \
            --build-name=${{ inputs.version }} \
            --build-number=${{ inputs.build_number }} \
            --dart-define="SENTRY_DSN=${{ vars.SENTRY_DSN }}"

      - name: Download linuxdeploy & AppImage plugin (stable versions)
        run: |
          cd build/linux/x64/release/bundle
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            LINUXDEPLOY_ARCH="aarch64"
            PLUGIN_ARCH="aarch64"
          else
            LINUXDEPLOY_ARCH="x86_64"
            PLUGIN_ARCH="x86_64"
          fi
          echo "Building for architecture: $ARCH"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-${LINUXDEPLOY_ARCH}.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-appimage-${PLUGIN_ARCH}.AppImage
          chmod +x linuxdeploy-*.AppImage
          # Verify main linuxdeploy works
          ./linuxdeploy-${LINUXDEPLOY_ARCH}.AppImage --version
          # Plugin doesn't support --version, skip check
          mv linuxdeploy-plugin-appimage-${PLUGIN_ARCH}.AppImage linuxdeploy-plugin-appimage

      - name: Create AppDir structure
        run: |
          cd build/linux/x64/release/bundle
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/metainfo

          cp -r lib/* AppDir/usr/lib/
          cp kover AppDir/usr/bin/
          cp -r data AppDir/usr/bin/

          cp ../../../../../linux/kover.desktop AppDir/usr/share/applications/kover.desktop
          cp ../../../../../assets/icon/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/kover.png
          cp ../../../../../linux/kover.metainfo.xml AppDir/usr/share/metainfo/kover.metainfo.xml

      - name: Build AppImage
        run: |
          cd build/linux/x64/release/bundle
          export PATH=".:$PATH"
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            LINUXDEPLOY_BIN="linuxdeploy-aarch64.AppImage"
          else
            LINUXDEPLOY_BIN="linuxdeploy-x86_64.AppImage"
          fi
          echo "=== AppDir structure ==="
          find AppDir -type f | head -30
          echo "=== Running linuxdeploy ==="
          ./$LINUXDEPLOY_BIN \
            --appdir AppDir \
            --plugin appimage \
            --output appimage \
            --desktop-file AppDir/usr/share/applications/kover.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/kover.png
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Rename AppImage
        run: |
          cd build/linux/x64/release/bundle
          ARCH=$(uname -m)
          mv Kover-*.AppImage "Kover-${{ inputs.version }}-${ARCH}.AppImage"
          echo "appimage_path=build/linux/x64/release/bundle/Kover-${{ inputs.version }}-${ARCH}.AppImage" >> $GITHUB_OUTPUT
        id: appimage

      - name: Upload AppImage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kover-linux-appimage
          path: ${{ steps.appimage.outputs.appimage_path }}
