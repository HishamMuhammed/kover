name: kover
description: "An unofficial cross-platform Kavita frontend."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  sentry_flutter: ^9.21.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  riverpod_annotation: ^4.0.0
  freezed_annotation: ^3.1.0
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  flutter_riverpod: ^3.0.3
  logger: ^2.6.2
  go_router: ^17.0.1
  html: ^0.15.6
  flutter_svg: ^2.2.3
  flutter_widget_from_html: ^0.17.1
  equatable: ^2.0.7
  flutter_animate: ^4.5.2
  chopper: ^8.5.0
  http: ^1.6.0
  scrollview_observer: ^1.26.3
  lucide_icons_flutter: ^3.1.9
  flutter_context_menu: ^0.4.1
  drift: ^2.31.0
  drift_flutter: ^0.3.0
  stream_transform: ^2.1.1
  rxdart: ^0.28.0
  connectivity_plus: ^7.0.0
  workmanager: ^0.9.0+3
  async: ^2.13.0
  csslib: ^1.0.2
  flutter_markdown_plus: ^1.0.7
  path: ^1.9.1
  pdfrx: ^2.3.2
  flutter_secure_storage: ^10.2.0
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.11.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  chopper_generator: ^8.5.0
  swagger_dart_code_generator: ^4.1.1
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.31.0
  go_router_builder: ^4.2.0
  yaml: ^3.1.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/icon.png

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: kover
  org: rodonisi
